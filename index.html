<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学校用 AIチャット</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; max-width: 500px; margin: 20px auto; padding: 20px; }
        #chat { height: 350px; border: 1px solid #333; overflow-y: auto; padding: 10px; background: #1e1e1e; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 6px; line-height: 1.4; }
        .user { background: #007aff; text-align: right; }
        .ai { background: #2a2a2a; color: #e0e0e0; }
        #input-area { display: flex; }
        input { flex: 1; padding: 12px; border: none; border-radius: 6px 0 0 6px; font-size: 16px; background: #333; color: #fff; }
        button { padding: 12px 20px; background: #34c759; color: white; border: none; border-radius: 0 6px 6px 0; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🏫 学校のPCで動く無料AIチャット</h2>
    <div id="chat">
        <div class="msg ai">準備完了です！ログイン不要で最新のAIと会話できます。何か話しかけてみてね！</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="メッセージを入力...">
        <button onclick="sendMessage()">送信</button>
    </div>

<script>
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMsg(text, 'user');
        input.value = '';

        try {
            // ⚠️ 完全に正しいAPI用のURLに修正しました
            const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Lama-3-8B-Instruct", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    inputs: `<|begin_of_text|><|start_header_id|>system<|end_header_id|>\n\nあなたは親切なAIアシスタントです。日本語で短く簡潔に回答してください。<|eot_id|><|start_header_id|>user<|end_header_id|>\n\n${text}<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`,
                    parameters: { max_new_tokens: 200, return_full_text: false }
                })
            });

            const data = await response.json();
            
            // ⚠️ 正しいデータ受け取りの配列処理（data[0]）に修正しました
            let aiReply = "";
            if (Array.isArray(data) && data[0]?.generated_text) {
                aiReply = data[0].generated_text.trim();
            } else if (data.error) {
                aiReply = "AIが混雑しています。もう一度送信してください。";
            } else {
                aiReply = "うまく聞き取れませんでした。";
            }

            appendMsg(aiReply, 'ai');

        } catch (error) {
            console.error(error);
            appendMsg("ネットワークエラーが発生しました。学校の制限に引っかかった可能性があります。", 'ai');
        }
    }

    function appendMsg(text, sender) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
